<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420" font-family="system-ui, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>

  <text x="450" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#212529">Workflow Optimization: Before &amp; After</text>

  <defs>
    <marker id="arr-center" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#339af0"/>
    </marker>
  </defs>

  <!-- ===== LEFT COLUMN: Before ===== -->
  <rect x="20" y="50" width="350" height="350" rx="8" fill="#fff5f5" stroke="#ffa8a8" stroke-width="2"/>
  <text x="195" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#c92a2a">Before Optimization</text>

  <!-- Row 1 -->
  <rect x="36" y="94" width="318" height="56" rx="5" fill="#ffffff" stroke="#ffa8a8" stroke-width="1"/>
  <text x="52" y="118" font-size="13" font-weight="bold" fill="#212529">Manual image layout</text>
  <text x="52" y="138" font-size="12" fill="#c92a2a">45 sec per study</text>
  <text x="322" y="124" text-anchor="end" font-size="22" fill="#ffa8a8">&#x231B;</text>

  <!-- Row 2 -->
  <rect x="36" y="162" width="318" height="56" rx="5" fill="#ffffff" stroke="#ffa8a8" stroke-width="1"/>
  <text x="52" y="186" font-size="13" font-weight="bold" fill="#212529">Manual prior retrieval</text>
  <text x="52" y="206" font-size="12" fill="#c92a2a">2&#x2013;3 min per case</text>
  <text x="322" y="192" text-anchor="end" font-size="22" fill="#ffa8a8">&#x231B;</text>

  <!-- Row 3 -->
  <rect x="36" y="230" width="318" height="56" rx="5" fill="#ffffff" stroke="#ffa8a8" stroke-width="1"/>
  <text x="52" y="254" font-size="13" font-weight="bold" fill="#212529">Unfiltered worklist</text>
  <text x="52" y="274" font-size="12" fill="#c92a2a">Extra search time per case</text>
  <text x="322" y="260" text-anchor="end" font-size="22" fill="#ffa8a8">&#x1F50D;</text>

  <!-- TAT Before -->
  <rect x="36" y="300" width="318" height="82" rx="5" fill="#ffe3e3" stroke="#fa5252" stroke-width="1.5"/>
  <text x="195" y="327" text-anchor="middle" font-size="13" fill="#495057">Average Turnaround Time</text>
  <text x="195" y="362" text-anchor="middle" font-size="30" font-weight="bold" fill="#fa5252">45 min</text>

  <!-- ===== CENTER ARROW ===== -->
  <rect x="400" y="180" width="100" height="60" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="450" y="204" text-anchor="middle" font-size="11" font-weight="bold" fill="#339af0">Configure</text>
  <text x="450" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#339af0">PACS</text>
  <line x1="500" y1="210" x2="520" y2="210" stroke="#339af0" stroke-width="2.5" marker-end="url(#arr-center)"/>

  <!-- ===== RIGHT COLUMN: After ===== -->
  <rect x="530" y="50" width="350" height="350" rx="8" fill="#f4fce3" stroke="#8ce99a" stroke-width="2"/>
  <text x="705" y="78" text-anchor="middle" font-size="15" font-weight="bold" fill="#2f9e44">After Optimization</text>

  <!-- Row 1 -->
  <rect x="546" y="94" width="318" height="56" rx="5" fill="#ffffff" stroke="#8ce99a" stroke-width="1"/>
  <text x="562" y="118" font-size="13" font-weight="bold" fill="#212529">Hanging protocols</text>
  <text x="562" y="138" font-size="12" fill="#2f9e44">Instant &#x2014; auto layout on open</text>
  <text x="832" y="124" text-anchor="end" font-size="22" fill="#8ce99a">&#x26A1;</text>

  <!-- Row 2 -->
  <rect x="546" y="162" width="318" height="56" rx="5" fill="#ffffff" stroke="#8ce99a" stroke-width="1"/>
  <text x="562" y="186" font-size="13" font-weight="bold" fill="#212529">Pre-fetch enabled</text>
  <text x="562" y="206" font-size="12" fill="#2f9e44">0 sec &#x2014; priors ready on open</text>
  <text x="832" y="192" text-anchor="end" font-size="22" fill="#8ce99a">&#x26A1;</text>

  <!-- Row 3 -->
  <rect x="546" y="230" width="318" height="56" rx="5" fill="#ffffff" stroke="#8ce99a" stroke-width="1"/>
  <text x="562" y="254" font-size="13" font-weight="bold" fill="#212529">Priority worklist</text>
  <text x="562" y="274" font-size="12" fill="#2f9e44">Top of queue &#x2014; filtered view</text>
  <text x="832" y="260" text-anchor="end" font-size="22" fill="#8ce99a">&#x2713;</text>

  <!-- TAT After -->
  <rect x="546" y="300" width="318" height="82" rx="5" fill="#d3f9d8" stroke="#40c057" stroke-width="1.5"/>
  <text x="705" y="327" text-anchor="middle" font-size="13" fill="#495057">Average Turnaround Time</text>
  <text x="705" y="362" text-anchor="middle" font-size="30" font-weight="bold" fill="#2f9e44">28 min</text>

  <!-- TAT Savings callout -->
  <rect x="400" y="300" width="100" height="82" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="450" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="#339af0">TAT</text>
  <text x="450" y="342" text-anchor="middle" font-size="11" font-weight="bold" fill="#339af0">Savings</text>
  <text x="450" y="370" text-anchor="middle" font-size="22" font-weight="bold" fill="#2f9e44">38%</text>
</svg>
